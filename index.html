<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Dashboard - Internal</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-top: 4px solid #0056b3;
            max-width: 400px;
        }
        h1 { font-size: 1.5rem; color: #0056b3; margin-bottom: 0.5rem; }
        p { font-size: 0.9rem; color: #666; line-height: 1.5; }
        .status-box {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #e9ecef;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Internal Management Node</h1>
        <p>This resource is restricted to authorized personnel only. If you believe you should have access, please contact your system administrator.</p>
        <div class="status-box">
            NODE_STATUS: ONLINE<br>
            VERSION: 2.4.1-LTS<br>
            Uptime: 142d 08h 12m
        </div>
    </div>
</body>
</html>
