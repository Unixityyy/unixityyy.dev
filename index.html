<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sketchpad — Free Online Drawing Tool</title>
  <meta name="description" content="A free online sketchpad and drawing tool for students and creatives. Draw, doodle, and sketch right in your browser. No sign-up required.">
  <meta name="keywords" content="sketchpad, drawing tool, online sketch, digital art, doodle, creative drawing, art tool, free drawing, paint online">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2ee;
      --toolbar: #1e1e2e;
      --toolbar-text: #cdd6f4;
      --accent: #cba6f7;
      --danger: #f38ba8;
      --surface: #313244;
      --border: #45475a;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* ── TOP BAR ── */
    header {
      background: var(--toolbar);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      height: 50px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      flex-wrap: nowrap;
      overflow-x: auto;
    }

    .logo {
      font-family: 'Caveat', cursive;
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
    }

    .sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }

    .tool-group { display: flex; align-items: center; gap: 3px; }

    .tool-btn {
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--toolbar-text);
      cursor: pointer;
      padding: 5px 9px;
      font-size: 12.5px;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .tool-btn:hover { background: var(--surface); border-color: var(--border); }
    .tool-btn.active { background: var(--accent); color: #1e1e2e; font-weight: 600; }

    .size-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--toolbar-text);
      font-size: 12px;
      white-space: nowrap;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 75px;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    .palette { display: flex; align-items: center; gap: 4px; }

    .swatch {
      width: 21px; height: 21px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.1s, border-color 0.1s;
      flex-shrink: 0;
    }
    .swatch:hover { transform: scale(1.2); }
    .swatch.active { border-color: #fff; transform: scale(1.15); }

    input[type=color] {
      width: 21px; height: 21px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: none;
      cursor: pointer;
      padding: 0;
      overflow: hidden;
      flex-shrink: 0;
    }

    .spacer { flex: 1; }

    .action-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--toolbar-text);
      cursor: pointer;
      padding: 5px 11px;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .action-btn:hover { background: var(--surface); }
    .action-btn.danger:hover { background: var(--danger); color: #1e1e2e; border-color: transparent; }

    /* ── CANVAS ── */
    .canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(rgba(160,160,180,0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(160,160,180,0.12) 1px, transparent 1px);
      background-size: 28px 28px;
      background-color: var(--bg);
    }

    canvas {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      box-shadow: 0 4px 40px rgba(0,0,0,0.18);
      cursor: crosshair;
      touch-action: none;
    }

    /* ── STATUS BAR ── */
    footer {
      background: var(--toolbar);
      border-top: 1px solid var(--border);
      height: 26px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 20px;
      font-size: 11px;
      color: #6c7086;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<header>
  <span class="logo">✏ sketchpad</span>
  <div class="sep"></div>

  <div class="tool-group">
    <button class="tool-btn active" id="tool-pen" onclick="setTool('pen')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg> Pen
    </button>
    <button class="tool-btn" id="tool-brush" onclick="setTool('brush')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9.06 11.9l8.07-8.06a2.85 2.85 0 014.03 4.03l-8.06 8.07"/><path d="M7.07 14.94c-1.66 1.7-3.57 2.55-5.07 2.05a2 2 0 01-1-3.06c.68-.97 1.9-1.4 3-1.52"/></svg> Brush
    </button>
    <button class="tool-btn" id="tool-eraser" onclick="setTool('eraser')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 20H7L3 16l10-10 7 7-2.5 2.5"/><path d="M6.5 17.5l5-5"/></svg> Eraser
    </button>
    <button class="tool-btn" id="tool-line" onclick="setTool('line')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="19" x2="19" y2="5"/></svg> Line
    </button>
    <button class="tool-btn" id="tool-rect" onclick="setTool('rect')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg> Rect
    </button>
    <button class="tool-btn" id="tool-circle" onclick="setTool('circle')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/></svg> Circle
    </button>
    <button class="tool-btn" id="tool-fill" onclick="setTool('fill')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 11l-8-8-8.5 8.5a5.5 5.5 0 007.78 7.78L19 11z"/><path d="M20 23a2 2 0 100-4 2 2 0 000 4z"/></svg> Fill
    </button>
  </div>

  <div class="sep"></div>

  <div class="size-wrap">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/></svg>
    <input type="range" id="size-slider" min="1" max="60" value="6" oninput="updateSize(this.value)">
    <span id="size-label">6px</span>
  </div>

  <div class="sep"></div>

  <div class="palette">
    <div class="swatch active" style="background:#1e1e2e" data-color="#1e1e2e" onclick="setColor(this)"></div>
    <div class="swatch" style="background:#f38ba8" data-color="#f38ba8" onclick="setColor(this)"></div>
    <div class="swatch" style="background:#fab387" data-color="#fab387" onclick="setColor(this)"></div>
    <div class="swatch" style="background:#f9e2af" data-color="#f9e2af" onclick="setColor(this)"></div>
    <div class="swatch" style="background:#a6e3a1" data-color="#a6e3a1" onclick="setColor(this)"></div>
    <div class="swatch" style="background:#89dceb" data-color="#89dceb" onclick="setColor(this)"></div>
    <div class="swatch" style="background:#cba6f7" data-color="#cba6f7" onclick="setColor(this)"></div>
    <div class="swatch" style="background:#ffffff;border-color:#555" data-color="#ffffff" onclick="setColor(this)"></div>
    <input type="color" id="custom-color" value="#cba6f7" title="Custom color" oninput="setCustomColor(this.value)">
  </div>

  <div class="spacer"></div>

  <button class="action-btn" onclick="undo()">↩ Undo</button>
  <button class="action-btn" onclick="saveImage()">⬇ Save</button>
  <button class="action-btn danger" onclick="clearCanvas()">✕ Clear</button>
</header>

<div class="canvas-wrap" id="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>

<footer>
  <span>sketchpad — draw freely in your browser</span>
  <span id="pos-display">x: 0, y: 0</span>
  <span id="tool-display">tool: pen &nbsp;|&nbsp; shortcuts: p b e l r c f</span>
</footer>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('canvas-wrap');

  function resizeCanvas() {
    const tempImg = ctx.getImageData(0, 0, canvas.width, canvas.height);
    canvas.width  = Math.min(wrap.clientWidth  - 48, 1400);
    canvas.height = Math.min(wrap.clientHeight - 48, 900);
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.putImageData(tempImg, 0, 0);
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  let tool = 'pen', color = '#1e1e2e', size = 6;
  let drawing = false, lastX = 0, lastY = 0, startX = 0, startY = 0;
  let snapshot = null;
  const undoStack = [];

  function saveUndo() {
    if (undoStack.length >= 30) undoStack.shift();
    undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
  }

  function undo() {
    if (undoStack.length) ctx.putImageData(undoStack.pop(), 0, 0);
  }

  function setTool(t) {
    tool = t;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tool-' + t).classList.add('active');
    document.getElementById('tool-display').textContent =
      'tool: ' + t + ' \u00a0|\u00a0 shortcuts: p b e l r c f';
    canvas.style.cursor = t === 'eraser' ? 'cell' : t === 'fill' ? 'copy' : 'crosshair';
  }

  function setColor(el) {
    color = el.dataset.color;
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
  }

  function setCustomColor(val) {
    color = val;
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  }

  function updateSize(val) {
    size = parseInt(val);
    document.getElementById('size-label').textContent = val + 'px';
  }

  function clearCanvas() {
    saveUndo();
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  function saveImage() {
    const a = document.createElement('a');
    a.download = 'sketch.png';
    a.href = canvas.toDataURL();
    a.click();
  }

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    if (e.touches) return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }

  function startDraw(e) {
    e.preventDefault();
    drawing = true;
    const p = getPos(e);
    lastX = startX = p.x; lastY = startY = p.y;
    saveUndo();
    if (tool === 'fill') {
      floodFill(Math.round(p.x), Math.round(p.y), color);
      drawing = false; return;
    }
    if (['line','rect','circle'].includes(tool)) snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
    ctx.beginPath(); ctx.moveTo(lastX, lastY);
  }

  function draw(e) {
    e.preventDefault();
    const p = getPos(e);
    document.getElementById('pos-display').textContent = `x: ${Math.round(p.x)}, y: ${Math.round(p.y)}`;
    if (!drawing) return;

    ctx.lineCap = 'round'; ctx.lineJoin = 'round';

    if (tool === 'pen') {
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = color; ctx.lineWidth = size;
      ctx.lineTo(p.x, p.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(p.x, p.y);
    }
    if (tool === 'brush') {
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = color; ctx.lineWidth = size * 3; ctx.globalAlpha = 0.3;
      ctx.lineTo(p.x, p.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.globalAlpha = 1;
    }
    if (tool === 'eraser') {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.strokeStyle = 'rgba(0,0,0,1)'; ctx.lineWidth = size * 2;
      ctx.lineTo(p.x, p.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(p.x, p.y);
      ctx.globalCompositeOperation = 'source-over';
    }
    if (tool === 'line') {
      ctx.putImageData(snapshot, 0, 0);
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = color; ctx.lineWidth = size;
      ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(p.x, p.y); ctx.stroke();
    }
    if (tool === 'rect') {
      ctx.putImageData(snapshot, 0, 0);
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = color; ctx.lineWidth = size;
      ctx.beginPath(); ctx.strokeRect(startX, startY, p.x - startX, p.y - startY);
    }
    if (tool === 'circle') {
      ctx.putImageData(snapshot, 0, 0);
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = color; ctx.lineWidth = size;
      const rx = (p.x - startX) / 2, ry = (p.y - startY) / 2;
      ctx.beginPath();
      ctx.ellipse(startX + rx, startY + ry, Math.abs(rx), Math.abs(ry), 0, 0, Math.PI * 2);
      ctx.stroke();
    }
    lastX = p.x; lastY = p.y;
  }

  function endDraw() { drawing = false; ctx.beginPath(); snapshot = null; }

  // Flood fill
  function floodFill(x, y, hex) {
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const d = img.data;
    const i = (y * canvas.width + x) * 4;
    const target = [d[i], d[i+1], d[i+2], d[i+3]];
    const fill = hexToRgb(hex);
    if (colorsMatch(target, fill)) return;
    const stack = [[x, y]];
    while (stack.length) {
      const [cx, cy] = stack.pop();
      if (cx < 0 || cx >= canvas.width || cy < 0 || cy >= canvas.height) continue;
      const j = (cy * canvas.width + cx) * 4;
      if (!colorsMatch([d[j],d[j+1],d[j+2],d[j+3]], target)) continue;
      d[j]=fill[0]; d[j+1]=fill[1]; d[j+2]=fill[2]; d[j+3]=255;
      stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
    }
    ctx.putImageData(img, 0, 0);
  }

  function hexToRgb(h) { return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16),255]; }
  function colorsMatch(a,b,t=30) { return Math.abs(a[0]-b[0])<t&&Math.abs(a[1]-b[1])<t&&Math.abs(a[2]-b[2])<t&&Math.abs(a[3]-b[3])<t; }

  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('mouseup', endDraw);
  canvas.addEventListener('mouseleave', endDraw);
  canvas.addEventListener('touchstart', startDraw, { passive: false });
  canvas.addEventListener('touchmove', draw, { passive: false });
  canvas.addEventListener('touchend', endDraw);

  document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'z') { undo(); return; }
    const map = { p:'pen', b:'brush', e:'eraser', l:'line', r:'rect', c:'circle', f:'fill' };
    if (map[e.key]) setTool(map[e.key]);
  });

  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
</script>
</body>
</html>
